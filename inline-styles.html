<!DOCTYPE html>
<html>
    <head>
        <title>inline style</title>
    </head>
    <body>
        <h1 style="font-size: 30px; color: #000; background-color: palevioletred;">
            Heading <span style="color: #f98101; background-color: aquamarine;">one</span></h1>
        <h2 style="font-size: 30px; color: fuchsia;">Heading 2</h2>
        <h3 style="font-size: 30px; color: #056605;">Heading 3</h3>
        <h4 style="font-size: 30px; color: rgb(255, 0, 0);">Heading 4</h4>
        <h1 style="font-size: 20px; color: rgba(rgba(0, 255, 153, 0.725), rgb(107, 0, 128), rgb(81, 255, 0), alpha);">Heading 1</h1>
        <h2 style="font-size: 20px;">Heading 2</h2>
        <h3 style="font-size: 20px;">Heading 3</h3>
        <h4 style="font-size: 20px;">Heading 4</h4>
    </body>
</html>
