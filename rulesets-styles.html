<!DOCTYPE html>
<html>
    <head>
        <title>ruleset style</title>
        <style>
            h1, h2, h3, h4 {
                color: antiquewhite;
                font-size: 30px;
                margin: 0;
            }
            h1{
                color: aqua;
                /*color: #f98101;*/
            }
            .important{
                color: #3dff71;
                background-color: rgb(45, 13, 224);
            }
            .uppercase{
                text-transform: uppercase;
                background-color: blueviolet;
            }
            #the-one{
                color: rgb(219, 181, 255);
            }
        </style>
    </head>
    <body>
        <h1 class="uppercase">Heading <span id="the-one">one</span></h1>
        <h2 class="important uppercase">Heading 2</h2>
        <h3 class="uppercase">Heading <span id="the-one">3</span></h3>
        <h4>Heading 4</h4>
        <h1 class="uppercase">Heading 1</h1>
        <h2 class="important">Heading 2</h2>
        <h3>Heading 3</h3>
        <h4>Heading 4</h4>
    </body>
</html>
